name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Verify Node
        run: |
          node -v
          npm -v

      - name: Install Dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install
          fi

      - name: Install Capacitor Android
        run: npm install @capacitor/android@latest --save

      - name: Build Web Application
        run: npm run build

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create Android Platform
        run: |
          if [ ! -d android ]; then
            npx cap add android
          fi

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Read App Name
        run: |
          APP_NAME=$(node -e "const c=require('./capacitor.config.json'); console.log(c.appName)")
          SAFE_NAME=$(echo "$APP_NAME" | sed 's/[^a-zA-Z0-9._-]/_/g')
          echo "APP_NAME=$SAFE_NAME" >> $GITHUB_ENV

      - name: Rename APK
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -n 1)

          if [ -z "$APK" ]; then
            echo "APK tidak ditemukan!"
            exit 1
          fi

          cp "$APK" "android/app/build/outputs/apk/${APP_NAME}.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}
          path: android/app/build/outputs/apk/${{ env.APP_NAME }}.apk